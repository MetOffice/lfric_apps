[command]
default=mkdir -p $MESH_DIR ; mpiexec -n 1 $BIN_DIR/planar_mesh_generator mesh_generation.nml

[env]
mesh_generator=Planar

[!!namelist:cubedsphere_mesh]

[namelist:mesh]
mesh_maps=''
mesh_names='seuk'
n_meshes=1
rotate_mesh=.true.
topology='non_periodic'

[namelist:planar_mesh]
create_lbc_mesh=.false.
domain_centre=1.69,-0.97
domain_size=1.28,0.96
edge_cells_x=64
edge_cells_y=64

periodic_x=.false.
periodic_y=.false.

[namelist:rotation]
target_north_pole=177.5,37.5
